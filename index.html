<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#10101a;--bg2:#14141f;--border:#28283c;--border2:#343450;
  --text:#e0dcd2;--text2:#a8a49a;--text3:#686875;
  --white:#f6f2e8;--gold:#d8b040;--gold2:#b08830;
  --ct:#4a7a58;--ce:#5060a0;--cem:#9a7830;--cb:#984848;
  --cbi:#487878;--cm:#386888;--cp:#783838;--cpo:#7a6828;
  --cbo:#386058;--cbu:#685878;--cco:#885038;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif}

/* ─── HEADER ─── */
#header{
  position:fixed;top:0;left:0;right:0;height:56px;
  background:rgba(5,5,7,0.97);border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 20px;gap:20px;z-index:500;
}
#header h1{font-size:20px;font-weight:900;color:var(--white);letter-spacing:-0.02em}
#header p{font-family:'Courier Prime',monospace;font-size:10px;color:var(--text3);letter-spacing:0.2em;text-transform:uppercase}
.rainbow{position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--ct),var(--ce),var(--cem),var(--cb),var(--cbi),var(--cm),var(--cp),var(--cpo),var(--cbo),var(--cbu),var(--cco))}

/* ─── HELP ─── */
#help{
  position:fixed;top:56px;left:0;right:0;height:30px;
  background:#08080c;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:24px;z-index:499;
}
.hint{font-family:'Courier Prime',monospace;font-size:10px;color:var(--text3);letter-spacing:0.12em;display:flex;align-items:center;gap:6px}
.hint span{color:var(--gold2)}

/* ─── MAIN SCROLL AREA ─── */
#stage{
  position:fixed;top:86px;left:0;right:0;bottom:0;
  overflow:auto;cursor:grab;
}
#stage:active{cursor:grabbing}

/* ─── SVG CANVAS ─── */
#canvas{display:block}

/* ─── DETAIL PANEL ─── */
#panel{
  position:fixed;right:-480px;top:86px;bottom:0;width:460px;
  background:#08080e;border-left:1px solid var(--border2);
  transition:right .25s cubic-bezier(.4,0,.2,1);
  z-index:600;overflow-y:auto;
}
#panel.open{right:0}
#panel-band{height:3px;background:var(--gold)}
#panel-header{padding:22px 22px 16px;border-bottom:1px solid var(--border)}
#panel-col{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
#panel-era{font-family:'Courier Prime',monospace;font-size:11px;color:var(--text3);letter-spacing:0.1em;margin-bottom:10px}
#panel-title{font-size:24px;font-weight:700;color:var(--white);letter-spacing:-0.02em;line-height:1.2;margin-bottom:4px}
#panel-en{font-family:'Courier Prime',monospace;font-size:12px;color:var(--text3);letter-spacing:0.05em;margin-bottom:12px}
#panel-icon{display:flex;justify-content:center;padding:16px 0;border-bottom:1px solid var(--border)}
#panel-icon svg{width:80px;height:80px}
#panel-body{padding:18px 22px}
#panel-desc{font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--text2);line-height:1.9;margin-bottom:18px}
.pfact{border:1px solid var(--border);padding:10px 12px;margin-bottom:8px;background:rgba(255,255,255,0.015)}
.pfact-lbl{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.pfact-val{font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--text);line-height:1.6}
.pconn-lbl{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-top:16px;margin-bottom:8px}
.pconn-wrap{display:flex;flex-wrap:wrap;gap:5px}
.pconn{font-family:'Courier Prime',monospace;font-size:10px;padding:3px 9px;border:1px solid var(--border2);color:var(--text3);letter-spacing:0.1em;cursor:pointer}
.pconn:hover{color:var(--text);border-color:var(--text3)}
#panel-close{
  position:absolute;top:14px;right:14px;width:28px;height:28px;
  border:1px solid var(--border2);background:transparent;cursor:pointer;
  color:var(--text3);font-size:13px;display:flex;align-items:center;justify-content:center;
}
#panel-close:hover{color:var(--white);border-color:var(--text2)}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2)}
</style>
</head>

function makeEl(tag, attrs={}){
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for(const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}
function txt(content, x, y, attrs={}){
  const el = makeEl('text',{x,y,...attrs});
  el.textContent = content;
  return el;
}

  x2:axisX, y2: totalH-20,
  stroke:'#1e1e28', 'stroke-width':1,
});
svg.appendChild(axisLineEl);

// ─── ERAS + NODES ───
let allCardData = [];

for(let ei=0;ei<ERAS.length;ei++){
  const era = ERAS[ei];
  const ey = PAD_TOP + ei*ERA_H;
  
  // Era horizontal separator
  const sepLine = makeEl('line',{
    x1: 0, y1: ey,
    x2: totalW, y2: ey,
    stroke: '#1a1a24',
    'stroke-width': ei===0?0:1,
  });
  svg.appendChild(sepLine);
  
  // Era colored accent
  const accentLine = makeEl('line',{
    x1: 20, y1: ey + 2,
    x2: 108, y2: ey + 2,
    stroke: era.color,
    'stroke-width': 1.5,
    opacity: '0.6',
  });
  svg.appendChild(accentLine);
  
  // Era year
  const eraYearG = makeEl('g',{transform: `translate(${axisX}, ${ey + ERA_H/2})`});
  const yearRotate = makeEl('g',{transform:'rotate(-90)'});
  const yearTxt = makeEl('text',{
    x:0, y:0,
    'text-anchor':'middle',
    'dominant-baseline':'middle',
    'font-family':'Courier Prime, monospace',
    'font-size':'10',
    'letter-spacing':'0.15em',
    fill: era.color,
  });
  yearTxt.textContent = era.en;
  yearRotate.appendChild(yearTxt);
  eraYearG.appendChild(yearRotate);
  svg.appendChild(eraYearG);
  
  // Era title
  const eraTitleTxt = makeEl('text',{
    x:20, y: ey+16,
    'font-family':'Courier Prime, monospace',
    'font-size':'7.5',
    'letter-spacing':'0.1em',
    fill: era.color,
    opacity:'0.7',
  });
  // Truncate long era names
  eraTitleTxt.textContent = era.zh.length > 10 ? era.zh.substring(0,10)+'…' : era.zh;
  svg.appendChild(eraTitleTxt);
  
  // Era dot
  svg.appendChild(makeEl('circle',{
    cx: axisX, cy: ey + ERA_H/2,
    r:3, fill: era.color, opacity:'0.6',
  }));
  
  // ─── NODES per column ───
  for(let c=0;c<COLS.length;c++){
    const col = COLS[c];
    const cx = PAD_LEFT + c*COL_W + COL_W/2;
    const nodes = era.nodes[col.id] || [];
    
    for(let ni=0;ni<nodes.length;ni++){
      const node = nodes[ni];
      const ny = ey + 30 + ni * NODE_SPACING;
      if(ny > ey + ERA_H - 20) continue;
      
      const cardId = `${era.id}_${col.id}_${ni}`;
      allCardData.push({
        id: cardId, cx, ny,
        col, era, node,
      });
      
      // ─── DRAW NODE ───
      const g = makeEl('g',{
        class:'node-g',
        'data-card':cardId,
        cursor:'pointer',
        transform:`translate(${cx},${ny})`,
      });
      
      // Connector from col center vertical line
      if(ni>0){
        g.appendChild(makeEl('line',{
          x1:0, y1:-NODE_SPACING+18,
          x2:0, y2:-18,
          stroke:col.color,
          'stroke-width':'0.5',
          opacity:'0.3',
          'stroke-dasharray':'2 3',
        }));
      }
      
      // Node shape
      const s = node.shape;
      if(s==='diamond'){
        g.appendChild(makeEl('polygon',{
          points:'0,-16 16,0 0,16 -16,0',
          fill:`${col.color}20`,
          stroke:col.color,
          'stroke-width':'1',
        }));
        g.appendChild(makeEl('polygon',{
          points:'0,-10 10,0 0,10 -10,0',
          fill:`${col.color}40`,
          stroke:'none',
        }));
      } else if(s==='circle'){
        g.appendChild(makeEl('circle',{r:15,fill:`${col.color}18`,stroke:col.color,'stroke-width':'1'}));
        g.appendChild(makeEl('circle',{r:8,fill:`${col.color}40`,stroke:'none'}));
      } else if(s==='triangle'){
        g.appendChild(makeEl('polygon',{
          points:'0,-16 15,12 -15,12',
          fill:`${col.color}18`,stroke:col.color,'stroke-width':'1',
        }));
      } else if(s==='hexagon'){
        const hex = [...Array(6)].map((_,i)=>{
          const a=i*60*Math.PI/180;
          return `${(12*Math.sin(a)).toFixed(1)},${(-12*Math.cos(a)).toFixed(1)}`;
        }).join(' ');
        g.appendChild(makeEl('polygon',{
          points:hex,fill:`${col.color}18`,stroke:col.color,'stroke-width':'1',
        }));
      } else { // square
        g.appendChild(makeEl('rect',{
          x:-10,y:-10,width:20,height:20,
          fill:`${col.color}18`,stroke:col.color,'stroke-width':'1',
        }));
      }
      
      // Node label (wrap short)
      const label = node.zh.length > 8 ? node.zh.substring(0,8) : node.zh;
      const lbl = makeEl('text',{
        x:0, y:28,
        'text-anchor':'middle',
        'font-family':'Noto Sans TC, sans-serif',
        'font-size':'9.5',
        fill:'#b0ac9e',
        'letter-spacing':'0.02em',
      });
      lbl.textContent = label;
      g.appendChild(lbl);
      
      // Hover/click ripple circle
      const ripple = makeEl('circle',{
        r:16, fill:'transparent',
        stroke:col.color,
        'stroke-width':'0',
        opacity:'0',
        class:'node-ripple',
      });
      g.appendChild(ripple);
      
      // Interaction
      g.addEventListener('mouseenter', ()=>{
        ripple.setAttribute('opacity','0.3');
        ripple.setAttribute('stroke-width','1');
      });
      g.addEventListener('mouseleave', ()=>{
        ripple.setAttribute('opacity','0');
        ripple.setAttribute('stroke-width','0');
      });
      g.addEventListener('click', ()=> openPanel(cardId));
      
      svg.appendChild(g);
    }
  }
}

// ─── Era connector dots on axis ───
for(let ei=1;ei<ERAS.length;ei++){
  const ey = PAD_TOP + ei*ERA_H;
  svg.appendChild(makeEl('line',{
    x1:axisX, y1: ey - ERA_H/2 + 10,
    x2:axisX, y2: ey - 10,
    stroke:'#1e1e28','stroke-width':'1',
    'stroke-dasharray':'2 4',
  }));
}

// ═══════════════════════════════════════════════
// PANEL LOGIC
// ═══════════════════════════════════════════════
const SHAPE_SVG = {
  diamond: `<polygon points="40,10 70,40 40,70 10,40" fill="FILL18" stroke="COL" stroke-width="1.5"/>
            <polygon points="40,22 58,40 40,58 22,40" fill="FILL40" stroke="none"/>
            <circle cx="40" cy="40" r="5" fill="COL" opacity="0.6"/>`,
  circle: `<circle cx="40" cy="40" r="30" fill="FILL18" stroke="COL" stroke-width="1.5"/>
            <circle cx="40" cy="40" r="18" fill="FILL30" stroke="COL" stroke-width="0.5" stroke-dasharray="3 3"/>
            <circle cx="40" cy="40" r="6" fill="COL" opacity="0.7"/>`,
  triangle: `<polygon points="40,8 72,64 8,64" fill="FILL18" stroke="COL" stroke-width="1.5"/>
              <polygon points="40,24 62,60 18,60" fill="FILL30" stroke="none"/>`,
  hexagon: `<polygon points="40,10 64,25 64,55 40,70 16,55 16,25" fill="FILL18" stroke="COL" stroke-width="1.5"/>
             <polygon points="40,22 56,31 56,49 40,58 24,49 24,31" fill="FILL30" stroke="none"/>`,
  square: `<rect x="10" y="10" width="60" height="60" fill="FILL18" stroke="COL" stroke-width="1.5"/>
            <rect x="20" y="20" width="40" height="40" fill="FILL30" stroke="COL" stroke-width="0.5" stroke-dasharray="2 2"/>
            <rect x="34" y="34" width="12" height="12" fill="COL" opacity="0.5"/>`,
};

function openPanel(cardId){
  const card = allCardData.find(c=>c.id===cardId);
  if(!card) return;
  const {col,era,node} = card;
  
  document.getElementById('panel-band').style.background = col.color;
  document.getElementById('panel-col').style.color = col.color;
  document.getElementById('panel-col').textContent = `${col.zh}  /  ${col.en}`;
  document.getElementById('panel-era').textContent = `${era.zh}　${era.en}`;
  document.getElementById('panel-title').textContent = node.zh;
  document.getElementById('panel-en').textContent = node.en;
  document.getElementById('panel-desc').textContent = node.desc;
  
  // Shape icon
  const shapeSvg = (SHAPE_SVG[node.shape]||SHAPE_SVG.diamond)
    .replace(/COL/g, col.color)
    .replace(/FILL18/g, col.color+'30')
    .replace(/FILL30/g, col.color+'50')
    .replace(/FILL40/g, col.color+'60');
  document.getElementById('panel-svg-icon').innerHTML = shapeSvg;
  
  // Facts
  const factsEl = document.getElementById('panel-facts');
  factsEl.innerHTML = '';
  if(node.facts){
    node.facts.forEach(([lbl,val])=>{
      factsEl.innerHTML += `<div class="pfact"><div class="pfact-lbl">${lbl}</div><div class="pfact-val">${val}</div></div>`;
    });
  }
  
  // Connections
  const connEl = document.getElementById('panel-connections');
  connEl.innerHTML = '';
  if(node.links && node.links.length){
    connEl.innerHTML = `<div class="pconn-lbl">⟶ 關聯概念</div><div class="pconn-wrap">`;
    node.links.forEach(l=>{
      connEl.innerHTML += `<span class="pconn">${l}</span>`;
    });
    connEl.innerHTML += '</div>';
  }
  
  document.getElementById('panel').classList.add('open');
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
}

// Click outside panel to close
document.getElementById('stage').addEventListener('click', e=>{
  if(!e.target.closest('.node-g') && !e.target.closest('#panel')){
    closePanel();
  }
});

// ─── DRAG TO PAN ───
let isDragging=false, startX=0, startY=0, scrollLeft=0, scrollTop=0;
const stage = document.getElementById('stage');
stage.addEventListener('mousedown', e=>{
  if(e.target.closest('.node-g')) return;
  isDragging=true;
  startX=e.pageX-stage.offsetLeft;
  startY=e.pageY-stage.offsetTop;
  scrollLeft=stage.scrollLeft;
  scrollTop=stage.scrollTop;
});
document.addEventListener('mouseup', ()=>isDragging=false);
document.addEventListener('mousemove', e=>{
  if(!isDragging) return;
  e.preventDefault();
  const x=e.pageX-stage.offsetLeft;
  const y=e.pageY-stage.offsetTop;
  stage.scrollLeft=scrollLeft-(x-startX);
  stage.scrollTop=scrollTop-(y-startY);
});

// ─── Initial scroll to center ───
window.addEventListener('load', ()=>{
  stage.scrollLeft = 0;
  stage.scrollTop = 0;
});
</script>
</body>
